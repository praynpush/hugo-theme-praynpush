# theme.toml template for a Hugo theme
# See https://github.com/gohugoio/hugoThemes#themetoml for an example

name        = "Pray&Push"
license     = "GPL-3.0-only"
licenselink = "https://github.com/praynpush/hugo-theme-praynpush/blob/master/LICENSE"
description = "A customized Hugo theme for Pray&Push"
homepage    = "https://github.com/praynpush/hugo-theme-praynpush"
demosite    = "https://praynpush.github.io"

tags = ["blog", "responsive", "clean", "light", "dark", "personal"]

features = [
    "disqus",
    "photoswipe",
    "opengraph",
    "widgets",
    "darkmode",
    "table of contents",
    "search",
]

min_version = "0.157.0"

[author]
    name     = "Pray&Push"
    homepage = "https://github.com/praynpush"
